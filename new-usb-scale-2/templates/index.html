<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scale Data</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1 {
            margin-bottom: 5px;
        }

        .live-reading {
            margin-bottom: 15px;
        }

        .live-reading label {
            display: inline-block;
            width: 60px;
            font-weight: bold;
        }

        .live-reading input {
            width: 200px;
            padding: 4px;
            font-size: 14px;
        }

        #status {
            color: orange;
            margin-top: 8px;
            font-size: 13px;
        }

        .info-bar {
            margin-top: 12px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #333;
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .info-bar span {
            background: #f0f0f0;
            border-radius: 4px;
            padding: 5px 12px;
        }

        #timerDisplay {
            font-weight: bold;
            color: #2980b9;
        }

        #recordingStatus {
            font-weight: bold;
        }

        .recording-on {
            color: #27ae60;
        }

        .recording-off {
            color: #e74c3c;
        }

        .button-row {
            margin-top: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 18px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            border: none;
        }

        #toggleBtn {
            background-color: #27ae60;
            color: white;
        }

        #toggleBtn.stopping {
            background-color: #e74c3c;
        }

        #saveNowBtn {
            background-color: #2980b9;
            color: white;
        }

        #saveNowBtn:disabled {
            background-color: #aaa;
            cursor: default;
        }

        #clearBtn {
            background-color: #e74c3c;
            color: white;
        }

        #clearBtn:disabled {
            background-color: #aaa;
            cursor: default;
        }

        h2 {
            margin-top: 10px;
            margin-bottom: 6px;
        }

        #recordCount {
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
        }

        .table-wrapper {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            width: 700px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        thead th {
            background-color: #333;
            color: white;
            padding: 8px 14px;
            text-align: left;
            position: sticky;
            top: 0;
        }

        td {
            padding: 5px 14px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #eaf4ff;
        }

        #csvLog {
            margin-top: 25px;
        }

        #csvLog h2 {
            margin-bottom: 6px;
        }

        #csvLogList {
            list-style: none;
            padding: 0;
            font-size: 13px;
        }

        #csvLogList li {
            padding: 4px 0;
            color: #27ae60;
        }

        #csvLogList li span {
            color: #555;
            margin-left: 8px;
        }

        #noCSV {
            font-size: 13px;
            color: #999;
            font-style: italic;
        }

        .progress-bar-container {
            width: 300px;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #2980b9;
            width: 0%;
            transition: width 1s linear;
        }
    </style>
</head>
<body>

<h1>Scale Data — Auto Logger</h1>

<!-- Live reading -->
<div class="live-reading">
    <label>Pounds:</label>
    <input id="lbs" value="Connecting..." readonly><br><br>
    <label>Ounces:</label>
    <input id="ozs" value="Connecting..." readonly>
</div>

<div id="status">Connecting to WebSocket...</div>

<!-- Info bar -->
<div class="info-bar">
    <span>Recording: <span id="recordingStatus" class="recording-off">Stopped</span></span>
    <span>Records this session: <span id="sessionCount">0</span></span>
    <span>Next CSV in: <span id="timerDisplay">10:00</span></span>
    <span>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </span>
</div>

<!-- Buttons -->
<div class="button-row">
    <button id="toggleBtn">Start Recording</button>
    <button id="saveNowBtn" disabled>Save CSV Now</button>
    <button id="clearBtn" disabled>Clear Table</button>
</div>

<!-- Live table -->
<h2>Recorded Weights</h2>
<div id="recordCount">No weights recorded yet.</div>
<div class="table-wrapper" id="tableWrapper" style="display:none;">
    <table id="weightTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Timestamp</th>
                <th>Pounds</th>
                <th>Ounces</th>
                <th>Total Ounces</th>
            </tr>
        </thead>
        <tbody id="weightTableBody"></tbody>
    </table>
</div>

<!-- CSV save log -->
<div id="csvLog">
    <h2>Saved CSV Files</h2>
    <div id="noCSV">No CSV files saved yet.</div>
    <ul id="csvLogList"></ul>
</div>

<script type="text/javascript">
    // ── Configuration ─────────────────────────────────────────────────────────
    var RECORD_INTERVAL_MS  = 1000;   // Record a weight every 1 second
    var CSV_INTERVAL_MS     = 10 * 60 * 1000; // Save CSV every 10 minutes

    // ── State ─────────────────────────────────────────────────────────────────
    var myWebsocket;
    var currentLbs = null;
    var currentOzs = null;
    var records = [];
    var rowCounter = 1;
    var isRecording = false;
    var recordTimer = null;
    var csvTimer = null;
    var csvCountdown = null;
    var secondsRemaining = CSV_INTERVAL_MS / 1000;
    var csvFileCount = 0;

    // ── WebSocket ─────────────────────────────────────────────────────────────
    setSockets();

    function setSockets() {
        myWebsocket = new WebSocket('ws://localhost:8001/');

        myWebsocket.onopen = function () {
            document.getElementById('status').style.color = 'green';
            document.getElementById('status').innerText = 'WebSocket connected!';
        };

        myWebsocket.onmessage = function (evt) {
            var data = JSON.parse(evt.data);
            currentLbs = data['lbs'];
            currentOzs = data['ozs'];
            document.getElementById('lbs').value = currentLbs;
            document.getElementById('ozs').value = currentOzs;
            document.getElementById('status').innerText = 'Receiving data...';
        };

        myWebsocket.onerror = function () {
            document.getElementById('status').style.color = 'red';
            document.getElementById('status').innerText = 'WebSocket error - check console (F12)';
        };

        myWebsocket.onclose = function (evt) {
            document.getElementById('status').style.color = 'red';
            document.getElementById('status').innerText = 'WebSocket closed. Code: ' + evt.code;
        };
    }

    // ── Recording controls ────────────────────────────────────────────────────
    document.getElementById('toggleBtn').addEventListener('click', function () {
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    });

    function startRecording() {
        isRecording = true;

        // Update UI
        document.getElementById('toggleBtn').innerText = 'Stop Recording';
        document.getElementById('toggleBtn').classList.add('stopping');
        document.getElementById('recordingStatus').innerText = 'Active';
        document.getElementById('recordingStatus').className = 'recording-on';
        document.getElementById('saveNowBtn').disabled = false;
        document.getElementById('clearBtn').disabled = false;

        // Reset countdown
        secondsRemaining = CSV_INTERVAL_MS / 1000;
        updateTimerDisplay();

        // Record every second
        recordTimer = setInterval(function () {
            recordCurrentWeight();
        }, RECORD_INTERVAL_MS);

        // Save CSV every 10 minutes
        csvTimer = setInterval(function () {
            saveCSV(true); // true = auto save
            records = [];  // Clear records after saving
            rowCounter = 1;
            document.getElementById('weightTableBody').innerHTML = '';
            document.getElementById('tableWrapper').style.display = 'none';
            updateRecordCount();
            secondsRemaining = CSV_INTERVAL_MS / 1000;
        }, CSV_INTERVAL_MS);

        // Countdown timer updates every second
        csvCountdown = setInterval(function () {
            secondsRemaining--;
            if (secondsRemaining < 0) secondsRemaining = 0;
            updateTimerDisplay();
            updateProgressBar();
        }, 1000);
    }

    function stopRecording() {
        isRecording = false;
        clearInterval(recordTimer);
        clearInterval(csvTimer);
        clearInterval(csvCountdown);

        document.getElementById('toggleBtn').innerText = 'Start Recording';
        document.getElementById('toggleBtn').classList.remove('stopping');
        document.getElementById('recordingStatus').innerText = 'Stopped';
        document.getElementById('recordingStatus').className = 'recording-off';
        document.getElementById('timerDisplay').innerText = '10:00';
        document.getElementById('progressBar').style.width = '0%';
    }

    // ── Record one weight reading ─────────────────────────────────────────────
    function recordCurrentWeight() {
        if (currentLbs === null || currentLbs === 'No scale connected') return;

        var now = new Date();
        var timestamp = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();
        var totalOzs = (parseFloat(currentLbs) * 16 + parseFloat(currentOzs)).toFixed(2);

        var record = {
            id: rowCounter++,
            timestamp: timestamp,
            lbs: currentLbs,
            ozs: currentOzs,
            totalOzs: totalOzs
        };

        records.push(record);
        addRowToTable(record);
        updateRecordCount();

        // Auto scroll table to bottom
        var wrapper = document.getElementById('tableWrapper');
        wrapper.scrollTop = wrapper.scrollHeight;
    }

    function addRowToTable(record) {
        var tbody = document.getElementById('weightTableBody');
        var row = document.createElement('tr');
        row.innerHTML =
            '<td>' + record.id + '</td>' +
            '<td>' + record.timestamp + '</td>' +
            '<td>' + record.lbs + '</td>' +
            '<td>' + record.ozs + '</td>' +
            '<td>' + record.totalOzs + '</td>';
        tbody.appendChild(row);
        document.getElementById('tableWrapper').style.display = 'block';
    }

    function updateRecordCount() {
        var count = records.length;
        document.getElementById('recordCount').innerText =
            count === 0 ? 'No weights recorded yet.' :
            count === 1 ? '1 weight recorded this interval.' :
            count + ' weights recorded this interval.';
        document.getElementById('sessionCount').innerText = count;
    }

    // ── CSV save ──────────────────────────────────────────────────────────────
    document.getElementById('saveNowBtn').addEventListener('click', function () {
        if (records.length === 0) {
            alert('No records to save yet.');
            return;
        }
        saveCSV(false);
    });

    function saveCSV(isAuto) {
        if (records.length === 0) return;

        var csvLines = ['#,Timestamp,Pounds,Ounces,Total Ounces'];
        records.forEach(function (r) {
            csvLines.push(
                r.id + ',' +
                '"' + r.timestamp + '",' +
                r.lbs + ',' +
                r.ozs + ',' +
                r.totalOzs
            );
        });

        var csvContent = csvLines.join('\n');
        var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        var url = URL.createObjectURL(blob);
        var filename = 'scale_weights_' + getFilenameTimestamp() + '.csv';

        var link = document.createElement('a');
        link.setAttribute('href', url);
        link.setAttribute('download', filename);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

        // Log the saved file
        logCSVSave(filename, records.length, isAuto);
    }

    function logCSVSave(filename, count, isAuto) {
        csvFileCount++;
        document.getElementById('noCSV').style.display = 'none';
        var list = document.getElementById('csvLogList');
        var item = document.createElement('li');
        var now = new Date();
        item.innerHTML =
            '&#10003; <strong>' + filename + '</strong>' +
            '<span>' + count + ' records &mdash; saved at ' +
            now.toLocaleTimeString() +
            (isAuto ? ' (auto)' : ' (manual)') + '</span>';
        list.appendChild(item);
    }

    // ── Clear table ───────────────────────────────────────────────────────────
    document.getElementById('clearBtn').addEventListener('click', function () {
        if (records.length === 0) return;
        if (!confirm('Clear all current records? This will NOT delete saved CSV files.')) return;
        records = [];
        rowCounter = 1;
        document.getElementById('weightTableBody').innerHTML = '';
        document.getElementById('tableWrapper').style.display = 'none';
        updateRecordCount();
    });

    // ── Timer display ─────────────────────────────────────────────────────────
    function updateTimerDisplay() {
        var mins = Math.floor(secondsRemaining / 60);
        var secs = secondsRemaining % 60;
        document.getElementById('timerDisplay').innerText =
            String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
    }

    function updateProgressBar() {
        var totalSeconds = CSV_INTERVAL_MS / 1000;
        var elapsed = totalSeconds - secondsRemaining;
        var pct = (elapsed / totalSeconds) * 100;
        document.getElementById('progressBar').style.width = pct + '%';
    }

    // ── Filename timestamp ────────────────────────────────────────────────────
    function getFilenameTimestamp() {
        var now = new Date();
        return now.getFullYear() + '-' +
            String(now.getMonth() + 1).padStart(2, '0') + '-' +
            String(now.getDate()).padStart(2, '0') + '_' +
            String(now.getHours()).padStart(2, '0') + '-' +
            String(now.getMinutes()).padStart(2, '0') + '-' +
            String(now.getSeconds()).padStart(2, '0');
    }
</script>

</body>
</html>
